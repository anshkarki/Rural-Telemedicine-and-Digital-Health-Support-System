<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Request — RuralMed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>:root{font-family:'DM Sans',sans-serif} h1,h2{font-family:'Syne',sans-serif}</style>
</head>
<body class="bg-slate-50">
<div id="app"><div class="flex items-center justify-center h-screen"><svg class="animate-spin w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg></div></div>
<script src="/js/api.js"></script><script src="/js/ui.js"></script>
<script>
if (!requireAuth('patient')) throw new Error('Unauthorized');

async function loadPage() {
  const emergencies = await GET('/health/emergencies/my').catch(() => []);

  const history = emergencies.length ? emergencies.map(e => `
    <div class="bg-white rounded-2xl p-5 border ${e.severity==='critical'?'border-red-300 bg-red-50/30':e.severity==='high'?'border-orange-200':'border-slate-100'} shadow-sm">
      <div class="flex items-start justify-between gap-4">
        <div>
          <div class="flex items-center gap-2 mb-1">
            ${statusBadge(e.severity)}
            ${statusBadge(e.status)}
          </div>
          <p class="text-slate-700 text-sm mt-2">${e.description}</p>
          ${e.location ? `<p class="text-slate-400 text-xs mt-1">📍 ${e.location}</p>` : ''}
        </div>
        <span class="text-xs text-slate-400 flex-shrink-0">${formatDateTime(e.created_at)}</span>
      </div>
      ${e.response ? `<div class="mt-3 pt-3 border-t border-slate-100 bg-emerald-50 rounded-xl px-4 py-3 text-sm"><span class="font-bold text-emerald-700">Medical Response: </span><span class="text-slate-700">${e.response}</span></div>` : ''}
    </div>
  `).join('') : emptyState('No emergency requests submitted', '✅');

  const content = `
    <div class="p-8">
      ${pageHeader('Emergency Request', 'Get immediate medical attention', '')}

      <!-- Emergency Button -->
      <div class="bg-gradient-to-br from-red-500 to-rose-600 rounded-3xl p-8 mb-8 text-center text-white shadow-2xl shadow-red-500/30">
        <div class="text-7xl mb-4 animate-bounce">🚨</div>
        <h2 class="text-2xl font-bold mb-2">Medical Emergency?</h2>
        <p class="text-red-100 mb-6">Fill in the form below and our medical team will respond immediately.</p>
        <div class="grid grid-cols-3 gap-4 text-sm text-red-100">
          <div class="bg-white/10 rounded-xl p-3"><div class="text-2xl mb-1">⚡</div>Instant Alert</div>
          <div class="bg-white/10 rounded-xl p-3"><div class="text-2xl mb-1">👨‍⚕️</div>Doctor Notified</div>
          <div class="bg-white/10 rounded-xl p-3"><div class="text-2xl mb-1">🏥</div>Admin Alerted</div>
        </div>
      </div>

      <div class="grid lg:grid-cols-2 gap-8">
        <!-- Emergency Form -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
          <h2 class="font-bold text-slate-800 text-lg mb-5">🆘 Submit Emergency Request</h2>
          <form id="emergencyForm" class="space-y-4">
            <div class="space-y-1.5">
              <label class="text-sm font-semibold text-slate-700">Severity Level <span class="text-red-500">*</span></label>
              <div class="grid grid-cols-4 gap-2" id="severityGrid">
                ${[['low','🟡','Low'],['medium','🟠','Medium'],['high','🔴','High'],['critical','🚨','Critical']].map(([val,icon,label]) => `
                  <button type="button" onclick="setSeverity('${val}', this)"
                    data-val="${val}"
                    class="severity-btn py-3 rounded-xl border-2 border-slate-200 text-center transition-all hover:border-red-400">
                    <div class="text-xl">${icon}</div>
                    <div class="text-xs font-semibold mt-1 text-slate-600">${label}</div>
                  </button>
                `).join('')}
              </div>
              <input type="hidden" id="severityVal" />
            </div>
            ${textareaField('Describe Your Emergency *', 'emergDesc', 'Describe your symptoms, condition, or emergency situation in detail...', 4)}
            ${inputField('Your Location', 'emergLocation', 'text', 'Village name, landmark, district...')}
            <button id="emergBtn" type="submit"
              class="w-full py-3.5 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition-all shadow-lg hover:shadow-red-500/30">
              🚨 Send Emergency Alert
            </button>
          </form>
        </div>

        <!-- History -->
        <div>
          <h2 class="font-bold text-slate-800 text-lg mb-4">Previous Emergency Requests</h2>
          <div class="space-y-3">${history}</div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = buildLayout('patient', '/patient/emergency.html', content);

  document.getElementById('emergencyForm').addEventListener('submit', async e => {
    e.preventDefault();
    const severity = document.getElementById('severityVal').value;
    const description = document.getElementById('emergDesc').value;
    const location = document.getElementById('emergLocation').value;
    if (!severity) return showToast('Please select severity level', 'warning');
    if (!description) return showToast('Please describe your emergency', 'warning');
    const btn = document.getElementById('emergBtn');
    showLoading(btn, 'Sending Alert...');
    try {
      await POST('/health/emergencies', { description, location, severity });
      showToast('🚨 Emergency alert sent! Medical team notified.', 'success');
      setTimeout(() => loadPage(), 1000);
    } catch(err) {
      showToast(err.message, 'error');
      hideLoading(btn);
    }
  });
}

function setSeverity(val, el) {
  document.querySelectorAll('.severity-btn').forEach(b => {
    b.classList.remove('border-red-500','bg-red-50');
    b.classList.add('border-slate-200');
  });
  el.classList.remove('border-slate-200');
  el.classList.add('border-red-500','bg-red-50');
  document.getElementById('severityVal').value = val;
}

loadPage();
</script>
</body>
</html>
