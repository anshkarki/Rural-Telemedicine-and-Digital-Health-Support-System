<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Issue — RuralMed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>:root{font-family:'DM Sans',sans-serif}</style>
</head>
<body class="bg-slate-50">
<div id="app"><div class="flex items-center justify-center h-screen"><svg class="animate-spin w-10 h-10 text-teal-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg></div></div>
<script src="/js/api.js"></script><script src="/js/ui.js"></script>
<script>
if (!requireAuth('patient')) throw new Error('Unauthorized');

async function loadPage() {
  const issues = await GET('/health/issues/my').catch(() => []);

  const list = issues.length ? issues.map(i => `
    <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm hover:shadow-md transition-all">
      <div class="flex items-start justify-between mb-3">
        <div>
          <h3 class="font-bold text-slate-800">${i.subject}</h3>
          <p class="text-slate-400 text-xs mt-0.5">${formatDateTime(i.created_at)}</p>
        </div>
        ${statusBadge(i.status)}
      </div>
      <p class="text-slate-600 text-sm">${i.description}</p>
      ${i.response ? `
        <div class="mt-3 pt-3 border-t border-slate-100">
          <div class="bg-teal-50 rounded-xl px-4 py-3 text-sm">
            <span class="font-bold text-teal-700">Doctor/Admin Response: </span>
            <span class="text-slate-700">${i.response}</span>
          </div>
        </div>
      ` : '<p class="text-xs text-slate-400 mt-3">⏳ Awaiting response...</p>'}
    </div>
  `).join('') : emptyState('No issues submitted yet', '❓');

  const content = `
    <div class="p-8">
      ${pageHeader('Submit Health Issue', 'Ask questions or report health concerns to our medical team')}
      <div class="grid lg:grid-cols-2 gap-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
          <h2 class="font-bold text-slate-800 text-lg mb-5">New Health Query</h2>
          <form id="issueForm" class="space-y-4">
            ${inputField('Subject / Topic *', 'issSubject', 'text', 'e.g. Chest pain, Fever, Medication query...', true)}
            ${textareaField('Describe Your Issue *', 'issDesc', 'Describe your health concern in detail. Include symptoms, duration, and any medications you are taking...', 5)}
            <button id="issBtn" type="submit"
              class="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl transition-all">
              Submit Issue
            </button>
          </form>
        </div>
        <div>
          <h2 class="font-bold text-slate-800 text-lg mb-4">My Submitted Issues</h2>
          <div class="space-y-4">${list}</div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = buildLayout('patient', '/patient/issues.html', content);
  document.getElementById('issueForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('issBtn');
    showLoading(btn, 'Submitting...');
    try {
      await POST('/health/issues', {
        subject: document.getElementById('issSubject').value,
        description: document.getElementById('issDesc').value
      });
      showToast('Issue submitted! We will respond shortly.', 'success');
      setTimeout(() => loadPage(), 1000);
    } catch(err) { showToast(err.message, 'error'); hideLoading(btn); }
  });
}

loadPage();
</script>
</body>
</html>
