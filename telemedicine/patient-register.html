<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Register — RuralMed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>:root{font-family:'DM Sans',sans-serif} h1,h2{font-family:'Syne',sans-serif}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-teal-950 to-slate-900 flex items-center justify-center p-6">
  <div class="w-full max-w-2xl">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-6">
        <div class="w-9 h-9 bg-teal-500 rounded-xl flex items-center justify-center text-white text-xl">⚕</div>
        <span class="text-white font-bold text-2xl" style="font-family:Syne,sans-serif">RuralMed</span>
      </a>
      <h1 class="text-3xl font-bold text-white">Patient Registration</h1>
      <p class="text-slate-400 mt-2">Create your account to access healthcare services</p>
    </div>
    
    <div class="bg-white/10 backdrop-blur-md border border-white/10 rounded-3xl p-8 shadow-2xl">
      <form id="registerForm" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Full Name *</label>
            <input id="name" type="text" required placeholder="Your full name" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent" />
          </div>
          <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Email Address *</label>
            <input id="email" type="email" required placeholder="you@example.com" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
          </div>
          <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Password *</label>
            <input id="password" type="password" required placeholder="Minimum 6 characters" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
          </div>
          <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Phone Number</label>
            <input id="phone" type="tel" placeholder="10-digit mobile number" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
          </div>
          <div class="col-span-2">
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Address</label>
            <input id="address" type="text" placeholder="Village, District, State" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Date of Birth</label>
            <input id="dob" type="date" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Gender</label>
            <select id="gender" class="w-full px-4 py-2.5 bg-slate-800 border border-white/20 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
              <option value="">Select gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Blood Group</label>
            <select id="bloodGroup" class="w-full px-4 py-2.5 bg-slate-800 border border-white/20 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
              <option value="">Select blood group</option>
              <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
              <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-200 mb-1.5">Known Medical History</label>
            <input id="medHistory" type="text" placeholder="e.g. Diabetes, BP" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
          </div>
        </div>
        
        <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500/30 rounded-xl px-4 py-3 text-red-300 text-sm"></div>
        
        <button id="submitBtn" type="submit" class="w-full py-3.5 bg-teal-500 hover:bg-teal-400 text-white font-bold rounded-xl transition-all duration-200 shadow-lg hover:shadow-teal-500/25 hover:scale-[1.02]">
          Create Account
        </button>
        
        <p class="text-center text-slate-400 text-sm">
          Already have an account? <a href="/patient-login.html" class="text-teal-400 font-semibold hover:underline">Sign In</a>
        </p>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.classList.add('hidden');
      showLoading(btn, 'Creating Account...');
      
      try {
        await POST('/auth/register/patient', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          phone: document.getElementById('phone').value,
          address: document.getElementById('address').value,
          date_of_birth: document.getElementById('dob').value,
          gender: document.getElementById('gender').value,
          blood_group: document.getElementById('bloodGroup').value,
          medical_history: document.getElementById('medHistory').value
        });
        showToast('Account created! Please log in.', 'success');
        setTimeout(() => window.location.href = '/patient-login.html', 1500);
      } catch (error) {
        err.textContent = error.message;
        err.classList.remove('hidden');
        hideLoading(btn);
      }
    });
  </script>
</body>
</html>
