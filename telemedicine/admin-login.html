<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — RuralMed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>:root{font-family:'DM Sans',sans-serif} h1{font-family:'Syne',sans-serif}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-violet-950 to-slate-900 flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 mb-6">
        <div class="w-9 h-9 bg-violet-500 rounded-xl flex items-center justify-center text-white text-xl">⚕</div>
        <span class="text-white font-bold text-2xl" style="font-family:Syne,sans-serif">RuralMed</span>
      </a>
      <div class="text-5xl mb-4">🛡️</div>
      <h1 class="text-3xl font-bold text-white">Admin Login</h1>
      <p class="text-slate-400 mt-2">System administration panel</p>
    </div>
    <div class="bg-white/10 backdrop-blur-md border border-white/10 rounded-3xl p-8 shadow-2xl">
      <div class="bg-violet-500/10 border border-violet-500/20 rounded-xl px-4 py-3 mb-6">
        <p class="text-violet-300 text-xs font-medium">🔒 Restricted access. Admin credentials required.</p>
        <p class="text-violet-400 text-xs mt-1">Default: admin@telemedicine.in / Admin@123</p>
      </div>
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-200 mb-1.5">Admin Email</label>
          <input id="email" type="email" required value="admin@telemedicine.in" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-200 mb-1.5">Password</label>
          <input id="password" type="password" required placeholder="Admin password" class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400" />
        </div>
        <div id="errorMsg" class="hidden bg-red-500/20 border border-red-500/30 rounded-xl px-4 py-3 text-red-300 text-sm"></div>
        <button id="submitBtn" type="submit" class="w-full py-3.5 bg-violet-600 hover:bg-violet-500 text-white font-bold rounded-xl transition-all duration-200 hover:scale-[1.02] shadow-lg">
          Sign In as Admin
        </button>
        <div class="border-t border-white/10 pt-4 flex gap-3 justify-center text-xs text-slate-500">
          <a href="/patient-login.html" class="hover:text-slate-300">Patient Login</a>
          <span>·</span>
          <a href="/doctor-login.html" class="hover:text-slate-300">Doctor Login</a>
        </div>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.classList.add('hidden');
      showLoading(btn, 'Signing in...');
      try {
        const data = await POST('/auth/login', { email: document.getElementById('email').value, password: document.getElementById('password').value, role: 'admin' });
        setAuth(data.token, data.user);
        window.location.href = '/admin/dashboard.html';
      } catch (error) {
        err.textContent = error.message;
        err.classList.remove('hidden');
        hideLoading(btn);
      }
    });
  </script>
</body>
</html>
